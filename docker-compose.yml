services:
  db:
    image: pgvector/pgvector:pg16
    container_name: rag_postgres
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    container_name: rag_ollama
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_KEEP_ALIVE=24h
    restart: unless-stopped

  backend:
    build:
      context: ./backend
    container_name: rag_backend
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 1
    volumes:
      - ./backend:/app
      - uploads_data:/data/uploads
      - hf_cache:/root/.cache/huggingface
      - backend_data:/app/data
    ports:
      - "127.0.0.1:8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      - SECRET_KEY=${SECRET_KEY}
      - DEFAULT_LLM_MODE=${DEFAULT_LLM_MODE:-local}
      - LOCAL_LLM_BASE_URL=http://ollama:11434/v1
      - LOCAL_LLM_MODEL_NAME=${LOCAL_LLM_MODEL_NAME:-qwen2.5:1.5b-instruct}
      - MISTRAL_API_KEY=${MISTRAL_API_KEY:-}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - EMBEDDING_MODEL=${EMBEDDING_MODEL}
      - RERANKER_MODEL=${RERANKER_MODEL}
      - RERANKER_TOP_K=${RERANKER_TOP_K}
      - TOP_K_RESULTS=${TOP_K_RESULTS}
      - MAX_CONTEXT_CHARS=${MAX_CONTEXT_CHARS}
      - SIMILARITY_THRESHOLD=${SIMILARITY_THRESHOLD}
      - ADMIN_USERNAME=${ADMIN_USERNAME}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - ENVIRONMENT=production
      - DEBUG=false
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    image: node:20-alpine
    container_name: rag_frontend
    working_dir: /app
    command: sh -c "npm install && npm run build && npx serve -s dist -l 5000"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    ports:
      - "127.0.0.1:5000:5000"
    environment:
      - VITE_API_PROXY_TARGET=http://backend:8000
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
  frontend_node_modules:
  uploads_data:
  hf_cache:
  backend_data:
  ollama_data: